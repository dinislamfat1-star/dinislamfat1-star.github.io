<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Чат — вход и регистрация</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0a0f1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 100%; max-width: 600px; height: 100vh; display: flex; flex-direction: column; background: #111827; overflow: hidden; }
        .header { background: #1f2937; color: white; padding: 16px; text-align: center; font-weight: bold; font-size: 1.3rem; border-bottom: 1px solid #374151; display: flex; justify-content: space-between; align-items: center; }
        .header button { background: #ef4444; border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 18px; word-wrap: break-word; font-size: 0.95rem; }
        .message.own { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.other { background: #374151; color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message .name { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
        .message .time { font-size: 0.6rem; text-align: right; margin-top: 4px; opacity: 0.6; }
        .input-area { display: flex; padding: 12px; background: #1f2937; gap: 8px; border-top: 1px solid #374151; }
        .input-area input { flex: 1; padding: 10px; border: none; border-radius: 24px; background: #374151; color: white; outline: none; font-size: 1rem; }
        .input-area button { background: #2563eb; border: none; color: white; width: 44px; border-radius: 44px; font-size: 1.5rem; cursor: pointer; }
        .auth-container { display: flex; flex-direction: column; gap: 20px; padding: 20px; }
        .auth-card { background: #1f2937; padding: 20px; border-radius: 24px; color: white; }
        .auth-card h3 { margin-bottom: 12px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 24px; border: none; background: #374151; color: white; text-align: center; font-size: 1rem; }
        .auth-card button { background: #2563eb; border: none; color: white; padding: 10px 20px; border-radius: 32px; font-size: 1rem; margin-top: 8px; cursor: pointer; width: 100%; }
        .error-box { background: #7f1a1a; color: #fecaca; padding: 10px; border-radius: 16px; margin-top: 12px; font-size: 0.8rem; text-align: center; display: none; }
        .status { text-align: center; padding: 8px; font-size: 0.8rem; color: #9ca3af; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <span>💬 Чат</span>
        <button id="logoutBtn" style="display:none;">Выйти</button>
    </div>
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h3>🔐 Вход</h3>
            <input type="text" id="loginName" placeholder="Имя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
        </div>
        <div class="auth-card">
            <h3>📝 Регистрация</h3>
            <input type="text" id="regName" placeholder="Имя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button id="regBtn">Зарегистрироваться</button>
        </div>
        <div id="globalError" class="error-box"></div>
    </div>
    <div id="chatContainer" style="display: none; flex-direction: column; flex:1;">
        <div class="messages" id="messagesList"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
        <div class="status" id="statusText"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC94FgGHfX7w8dyMnQxiLBPwI66vYuS2r0",
        authDomain: "altcloud-24dc3.firebaseapp.com",
        databaseURL: "https://altcloud-24dc3-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "altcloud-24dc3",
        storageBucket: "altcloud-24dc3.firebasestorage.app",
        messagingSenderId: "335868243516",
        appId: "1:335868243516:web:b8ae386ef64ef51b28dd39"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    const authContainer = document.getElementById('authContainer');
    const chatContainer = document.getElementById('chatContainer');
    const messagesList = document.getElementById('messagesList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const statusDiv = document.getElementById('statusText');
    const globalError = document.getElementById('globalError');

    const loginName = document.getElementById('loginName');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const regName = document.getElementById('regName');
    const regPassword = document.getElementById('regPassword');
    const regBtn = document.getElementById('regBtn');

    let currentUser = null;
    let messagesRef = null;

    function showError(msg) {
        globalError.style.display = 'block';
        globalError.textContent = msg;
        setTimeout(() => globalError.style.display = 'none', 6000);
    }

    function nameToEmail(name) {
        let clean = name.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        if (!clean) clean = 'user';
        return clean + '@chat.local';
    }

    function displayMessages(snapshot) {
        if (!messagesList) return;
        messagesList.innerHTML = '';
        const messages = [];
        snapshot.forEach(child => messages.push({ id: child.key, ...child.val() }));
        messages.sort((a,b) => a.timestamp - b.timestamp);
        for (let msg of messages) {
            const div = document.createElement('div');
            const isOwn = (msg.uid === currentUser?.uid);
            div.className = 'message ' + (isOwn ? 'own' : 'other');
            const nameSpan = document.createElement('div');
            nameSpan.className = 'name';
            nameSpan.textContent = msg.displayName || 'Аноним';
            const textSpan = document.createElement('div');
            textSpan.textContent = msg.text;
            const timeSpan = document.createElement('div');
            timeSpan.className = 'time';
            timeSpan.textContent = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            div.appendChild(nameSpan);
            div.appendChild(textSpan);
            div.appendChild(timeSpan);
            messagesList.appendChild(div);
        }
        // Принудительная прокрутка вниз после обновления
        requestAnimationFrame(() => {
            messagesList.scrollTop = messagesList.scrollHeight;
        });
    }

    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !currentUser) return;
        messagesRef.push({
            text: text,
            uid: currentUser.uid,
            displayName: currentUser.displayName,
            timestamp: Date.now()
        }).then(() => messageInput.value = '')
          .catch(err => statusDiv.textContent = 'Ошибка: ' + err.message);
    }

    function logout() {
        auth.signOut().then(() => window.location.reload());
    }

    regBtn.addEventListener('click', async () => {
        const rawName = regName.value.trim();
        const password = regPassword.value;
        if (!rawName || !password) {
            showError('Заполните имя и пароль');
            return;
        }
        if (password.length < 6) {
            showError('Пароль должен быть не менее 6 символов');
            return;
        }
        const email = nameToEmail(rawName);
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await userCredential.user.updateProfile({ displayName: rawName });
        } catch (err) {
            let msg = err.message;
            if (err.code === 'auth/email-already-in-use') msg = 'Это имя уже занято. Выберите другое.';
            showError(msg);
        }
    });

    loginBtn.addEventListener('click', async () => {
        const rawName = loginName.value.trim();
        const password = loginPassword.value;
        if (!rawName || !password) {
            showError('Заполните имя и пароль');
            return;
        }
        const email = nameToEmail(rawName);
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
            let msg = err.message;
            if (err.code === 'auth/user-not-found') msg = 'Пользователь не найден. Зарегистрируйтесь.';
            else if (err.code === 'auth/wrong-password') msg = 'Неверный пароль.';
            showError(msg);
        }
    });

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            if (!user.displayName) {
                let name = user.email.replace('@chat.local', '');
                user.updateProfile({ displayName: name });
            }
            authContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            logoutBtn.style.display = 'block';
            statusDiv.textContent = `Вы вошли как ${user.displayName}`;
            if (!messagesRef) {
                messagesRef = database.ref('messages');
                messagesRef.on('value', displayMessages);
            }
        } else {
            currentUser = null;
            authContainer.style.display = 'flex';
            chatContainer.style.display = 'none';
            logoutBtn.style.display = 'none';
            statusDiv.textContent = '';
            if (messagesRef) {
                messagesRef.off();
                messagesRef = null;
            }
            if (messagesList) messagesList.innerHTML = '';
        }
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    logoutBtn.addEventListener('click', logout);
</script>
</body>
</html>
